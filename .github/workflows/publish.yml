name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Explicit ``permissions`` replaces the default GITHUB_TOKEN scopes
      # wholesale, so we have to name every scope we need — ``id-token:
      # write`` alone would break actions/checkout on any repo/org whose
      # default scopes are restricted.
      contents: read
      id-token: write

    steps:
      # Actions pinned to full commit SHAs (not mutable tags) so a
      # supply-chain compromise of a moving ref cannot publish a poisoned
      # wheel to PyPI under this project's OIDC identity. Comments name
      # the upgrade target used at pin time — refresh deliberately.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        # Matches the declared runtime floor in pyproject.toml
        # (``requires-python = ">=3.12"``). Keep in sync when bumping.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 (2025-11-17)
